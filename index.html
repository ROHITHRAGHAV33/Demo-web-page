
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TN Farmer Portal Pro</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f4f7f4}
header{background:#198754;color:#fff;padding:20px}
.container{max-width:1200px;margin:auto;padding:20px}
.card{background:#fff;padding:18px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.1);margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px}
input,select,button{padding:10px;width:100%;margin:5px 0}
button{background:#198754;color:#fff;border:none;cursor:pointer}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border:1px solid #ddd}
th{background:#198754;color:#fff}
</style>
</head>
<body>
<header><h1>🌾 Tamil Nadu Farmer Portal Pro</h1></header>
<div class="container">

<div class="card">
<h2>Weather (Location Based)</h2>
<button onclick="getLocation()">Get My Location</button>
<p id="weather">Click button to detect location.</p>
</div>

<div class="card">
<h2>Profit Calculator</h2>
<input type="number" id="income" placeholder="Income">
<input type="number" id="expense" placeholder="Expense">
<button onclick="profit()">Calculate</button>
<p id="profitResult"></p>
</div>

<div class="card">
<h2>Fertilizer Requirement Calculator</h2>
<input type="number" id="acre" placeholder="Land Area (Acres)">
<select id="crop">
<option>Paddy</option>
<option>Banana</option>
<option>Groundnut</option>
</select>
<button onclick="fertilizer()">Calculate</button>
<p id="fertResult"></p>
</div>

<div class="card">
<h2>Market Prices Search</h2>
<input id="search" placeholder="Search crop" onkeyup="filterTable()">
<table id="marketTable">
<tr><th>Crop</th><th>District</th><th>Price</th></tr>
<tr><td>Paddy</td><td>Erode</td><td>2200</td></tr>
<tr><td>Groundnut</td><td>Madurai</td><td>6200</td></tr>
<tr><td>Coconut</td><td>Pollachi</td><td>14500</td></tr>
</table>
</div>

<div class="card">
<h2>Government Portals</h2>
<div class="grid">
<a href="https://pmkisan.gov.in" target="_blank"><button>PM-KISAN</button></a>
<a href="https://pmfby.gov.in" target="_blank"><button>Crop Insurance</button></a>
<a href="https://www.enam.gov.in" target="_blank"><button>eNAM</button></a>
<a href="https://tnfr.agristack.gov.in" target="_blank"><button>Farmer Registry</button></a>
</div>
</div>

</div>

<script>
function profit(){
 let i=+document.getElementById('income').value||0;
 let e=+document.getElementById('expense').value||0;
 let p=i-e;
 localStorage.setItem('lastProfit',p);
 document.getElementById('profitResult').innerHTML="Profit ₹"+p.toLocaleString();
}

function fertilizer(){
 let acre=+document.getElementById('acre').value||0;
 let crop=document.getElementById('crop').value;
 let rate={Paddy:50,Banana:80,Groundnut:35};
 let req=acre*rate[crop];
 document.getElementById('fertResult').innerHTML=
 crop+" requires approx "+req+" kg fertilizer.";
}

function filterTable(){
 let val=document.getElementById('search').value.toLowerCase();
 let rows=document.querySelectorAll("#marketTable tr");
 rows.forEach((r,i)=>{
 if(i===0) return;
 r.style.display=r.innerText.toLowerCase().includes(val)?"":"none";
 });
}

function getLocation(){
 if(navigator.geolocation){
 navigator.geolocation.getCurrentPosition(pos=>{
 document.getElementById('weather').innerHTML=
 "Latitude: "+pos.coords.latitude.toFixed(3)+
 "<br>Longitude: "+pos.coords.longitude.toFixed(3)+
 "<br>Connect OpenWeather API for live forecast.";
 });
 }
}

window.onload=()=>{
 let last=localStorage.getItem('lastProfit');
 if(last) document.getElementById('profitResult').innerHTML="Last Profit ₹"+Number(last).toLocaleString();
}
</script>
</body>
</html>
